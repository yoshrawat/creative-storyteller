steps:
  # 1. Build the image with the build-arg
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '--build-arg',
        'NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}',
        '-t',
        'gcr.io/${PROJECT_ID}/storyteller-frontend',
        '.',
      ]

  # 2. Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${PROJECT_ID}/storyteller-frontend']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'storyteller-frontend',
        '--image',
        'gcr.io/${PROJECT_ID}/storyteller-frontend',
        '--region',
        '${_REGION}',
        '--allow-unauthenticated',
        '--platform',
        'managed',
        '--set-env-vars',
        'NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}',
      ]

substitutions:
  _NEXT_PUBLIC_API_URL: 'http://localhost:8000'
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
